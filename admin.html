<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Norval Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Montserrat',sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
   .container{max-width:1400px;margin:0 auto}
   .login-box{max-width:450px;margin:100px auto;background:#1e293b;padding:50px;border-radius:20px;border:1px solid #334155;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
   .logo-icon{width:80px;height:80px;background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%);border-radius:20px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:white}
   .login-box h1{margin-bottom:10px;color:#fff;font-size:28px;font-weight:800;text-transform:uppercase}
   .login-sub{color:#94a3b8;margin-bottom:30px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
        input{width:100%;padding:16px;margin:12px 0;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#e2e8f0;font-size:16px;font-family:'Montserrat',sans-serif;font-weight:700;text-align:center}
        input:focus{outline:none;border-color:#dc2626}
   .btn{width:100%;background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%);color:white;padding:16px;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:15px;text-transform:uppercase;letter-spacing:1px;box-shadow:0 10px 30px rgba(220,38,38,0.4)}
   .btn:hover{transform:translateY(-2px)}
   .hidden{display:none}
   .header{background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%);padding:30px;border-radius:20px;margin-bottom:25px;box-shadow:0 10px 40px rgba(220,38,38,0.4)}
        h1{font-size:30px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
   .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:25px}
   .card{background:#1e293b;padding:25px;border-radius:16px;border:1px solid #334155;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
